name: Scrape ikman.lk

# Minutes math (private repos, Free plan ≈ 2,000 min/month):
#   every 5 min  ≈ 8k–20k+ min/month (easy to exhaust)
#   every 15 min ≈ more sustainable with Playwright caching
#   every 30–60 min fits Free more reliably
# Public repos: GitHub-hosted Actions minutes are free (subject to fair use).
# Manual "Run Now" still works via workflow_dispatch.
on:
  #schedule:
    # Default: every 15 minutes (UTC). Change to '*/30 * * * *' if you hit quota.
    #- cron: '*/15 * * * *'
  workflow_dispatch:

# Never stack scrapes — one at a time (queued runs wait; no parallel bill)
concurrency:
  group: scrape-ikman
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Prefer offline cache when lockfile unchanged
        run: npm ci --prefer-offline

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      # System libs are not in the browser cache; still needed on cache hit
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: npx tsx scraper/index.ts
